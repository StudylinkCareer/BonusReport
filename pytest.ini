# pytest.ini — test configuration for the StudyLink BonusReport project.
#
# pythonpath puts these directories on sys.path during test collection:
#   .         -> lets tests import 'backend.foo.bar' (new style)
#   backend   -> lets tests import 'engine.foo' or 'data.foo' (legacy style)
#
# This is a transitional setting. Once all tests use the 'backend.foo' style,
# the 'backend' entry can be dropped.

[pytest]
pythonpath = . backend
testpaths = backend/tests
